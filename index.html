<!DOCTYPE html>
<html lang="dv" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ރެންޑަމް ވިނަރ ސިލެކްޓަރ</title>

<link href="https://fonts.googleapis.com/css2?family=Faruma&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/winwheel@2.7.0/Winwheel.min.js"></script>

<style>

body{
font-family:'Faruma',sans-serif;
background:#0f172a;
color:white;
margin:0;
}

.light{
background:#f4f4f4;
color:#111;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
background:#1e293b;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

button{
background:#3b82f6;
border:none;
padding:10px 16px;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

input,textarea{
width:100%;
padding:10px;
border-radius:6px;
border:none;
margin-top:5px;
}

.participant{
padding:6px;
border-bottom:1px solid #444;
}

#wheelCanvas{
margin:auto;
display:block;
}

</style>
</head>

<body>

<header>

<div style="display:flex;align-items:center;gap:10px">

<img id="logo" src="" style="height:40px">

<input type="file" id="logoUpload" hidden>

<label for="logoUpload">
<i class="fa-solid fa-image"></i>
</label>

<h3>ވިނަރ ސިލެކްޓަރ</h3>

</div>

<div>

<button onclick="toggleTheme()">
<i class="fa-solid fa-moon"></i>
</button>

<button onclick="adminLogin()">
<i class="fa-solid fa-lock"></i>
</button>

</div>

</header>

<div class="container">

<div class="card">

<h3><i class="fa-solid fa-upload"></i> ފައިލް އަޕްލޯޑް</h3>

<input type="file" id="fileInput">

</div>

<div class="card">

<h3><i class="fa-solid fa-keyboard"></i> މެނުއަލް އެންޓްރީ</h3>

<textarea id="manual"></textarea>

<button onclick="addManual()">އެޑް</button>

</div>

<div class="card">

<h3><i class="fa-solid fa-search"></i> ސާޗް</h3>

<input type="text" id="search" onkeyup="searchParticipants()">

</div>

<div class="card">

<h3><i class="fa-solid fa-users"></i> ޕާޓިސިޕަންޓްސް</h3>

<div id="participants"></div>

</div>

<div class="card">

<h3><i class="fa-solid fa-dharmachakra"></i> ސްޕިން ވީލް</h3>

<canvas id="wheelCanvas" width="400" height="400"></canvas>

<button onclick="spinWheel()">ސްޕިން</button>

</div>

<div class="card">

<h3><i class="fa-solid fa-trophy"></i> ވިނަރސް</h3>

<div id="winners"></div>

<button onclick="exportCSV()">
<i class="fa-solid fa-download"></i>
CSV
</button>

</div>

</div>

<script>

let participants=[];
let winners=[];
let wheel;

function save(){
localStorage.setItem("participants",JSON.stringify(participants));
}

function load(){

let p=localStorage.getItem("participants");

if(p){
participants=JSON.parse(p);
}

render();
buildWheel();

}

function render(){

let div=document.getElementById("participants");

div.innerHTML="";

participants.forEach(p=>{

let d=document.createElement("div");
d.className="participant";
d.innerText=p;

div.appendChild(d);

});

}

function addManual(){

let text=document.getElementById("manual").value;

let names=text.split(/[\n,]+/);

names.forEach(n=>{
if(n.trim())participants.push(n.trim());
});

save();
render();
buildWheel();

}

document.getElementById("fileInput").addEventListener("change",function(e){

let file=e.target.files[0];

let reader=new FileReader();

reader.onload=function(evt){

let data=evt.target.result;

if(file.name.endsWith(".csv")){

let names=data.split(/[\n,]+/);

names.forEach(n=>participants.push(n));

}

else{

let workbook=XLSX.read(data,{type:'binary'});

let sheet=workbook.Sheets[workbook.SheetNames[0]];

let rows=XLSX.utils.sheet_to_json(sheet,{header:1});

rows.forEach(r=>{
if(r[0])participants.push(r[0]);
});

}

save();
render();
buildWheel();

};

reader.readAsBinaryString(file);

});

function buildWheel(){

let segments=participants.map(p=>({text:p}));

wheel=new Winwheel({

canvasId:'wheelCanvas',
numSegments:segments.length,
segments:segments

});

}

function spinWheel(){

wheel.startAnimation();

let index=Math.floor(Math.random()*participants.length);

let winner=participants[index];

winners.push(winner);

let div=document.getElementById("winners");

let d=document.createElement("div");
d.innerText=winner;

div.appendChild(d);

}

function exportCSV(){

let csv="Winner\n";

winners.forEach(w=>{
csv+=w+"\n";
});

let blob=new Blob([csv]);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="winners.csv";

a.click();

}

function searchParticipants(){

let q=document.getElementById("search").value.toLowerCase();

let div=document.getElementById("participants");

div.innerHTML="";

participants.filter(p=>p.toLowerCase().includes(q)).forEach(p=>{

let d=document.createElement("div");
d.className="participant";
d.innerText=p;

div.appendChild(d);

});

}

function toggleTheme(){

document.body.classList.toggle("light");

}

function adminLogin(){

let pass=prompt("Admin Password");

if(pass==="admin123"){

alert("Admin Mode");

}

}

document.getElementById("logoUpload").addEventListener("change",function(e){

let file=e.target.files[0];

let reader=new FileReader();

reader.onload=function(){

document.getElementById("logo").src=reader.result;

localStorage.setItem("logo",reader.result);

};

reader.readAsDataURL(file);

});

let savedLogo=localStorage.getItem("logo");

if(savedLogo){
document.getElementById("logo").src=savedLogo;
}

load();

</script>

</body>
</html>
